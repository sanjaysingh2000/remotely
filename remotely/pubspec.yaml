name: remotely
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  
  cupertino_icons: ^1.0.8

  #statemanagement
  flutter_bloc: ^9.1.1
  
  #firebase
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6

  freezed_annotation: ^3.1.0

  #shimmers
  shimmer: ^3.0.0

  #network
  dio: ^5.10.0
  pretty_dio_logger: ^1.4.0
  retrofit: ^4.9.2

  #navigation
  go_router: ^9.0.1

  #servicelocator
  get_it: ^8.3.0

  json_annotation: any

  #image
  cached_network_image: any

  #localdb
  sqflite: ^2.4.3

  #pathprovider
  path_provider: any

  path: any
  flutter_secure_storage: any

  google_fonts: any

  awesome_snackbar_content: ^0.1.8

  flutter_html: ^3.0.0
  url_launcher: any
  

  

dev_dependencies:
  flutter_test:
    sdk: flutter

  
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  build_runner: ^2.15.1
  retrofit_generator: ^10.2.7
  json_serializable: any

